<div class="page-body">
  <div class="container-xl">

    <div class="row row-cards">
      <div class="col-12">
        <div id="networks-no-context-alert" class="alert alert-info mb-3" role="alert">
          Select a <strong>workspace</strong> and <strong>project</strong> in the top bar to load VPCs.
        </div>
      </div>
      <div class="col-12">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">VPC List</h3>
            <div class="card-options ms-auto d-flex gap-2 align-items-center">
              <span id="networks-context-label" class="text-secondary small"></span>
            </div>
          </div>
          <div class="card-body p-0">
            <div id="vpc-table"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- View Mode Cards (hidden until row click) -->
    <div id="view-mode-cards" class="collapse">
      <div class="row row-cards mt-2">
        <div class="col-12">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">VPC Info — <span id="detail-name" class="text-primary"></span></h3>
              <div class="card-options">
                <button class="btn btn-sm btn-ghost-danger" onclick="deleteVpc()">Delete</button>
                <a href="#" class="card-options-remove" onclick="hideDetail()">
                  <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24"
                    stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                    <path d="M18 6l-12 12"></path>
                    <path d="M6 6l12 12"></path>
                  </svg>
                </a>
              </div>
            </div>
            <div class="card-body">
              <div class="datagrid">
                <div class="datagrid-item">
                  <div class="datagrid-title">VPC Name</div>
                  <div class="datagrid-content" id="detail-vpcName">-</div>
                </div>
                <div class="datagrid-item">
                  <div class="datagrid-title">IPv4 CIDR</div>
                  <div class="datagrid-content" id="detail-cidrBlock">-</div>
                </div>
                <div class="datagrid-item">
                  <div class="datagrid-title">Connection</div>
                  <div class="datagrid-content" id="detail-connection">-</div>
                </div>
              </div>
              <h4 class="mt-3">Subnets</h4>
              <div id="subnet-table"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Create Modal -->
<div class="modal modal-blur fade" id="create-vpc-modal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Create VPC</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label required">VPC Name</label>
          <input type="text" id="modal-vpcName" class="form-control" placeholder="my-vpc">
        </div>
        <div class="mb-3">
          <label class="form-label required">IPv4 CIDR</label>
          <input type="text" id="modal-cidrBlock" class="form-control" placeholder="10.0.0.0/16">
        </div>
        <div class="mb-2">
          <label class="form-label required">Subnets</label>
          <div id="subnet-rows">
            <div class="subnet-row row g-2 mb-2">
              <div class="col-4"><input type="text" class="form-control form-control-sm subnet-name" placeholder="Subnet Name"></div>
              <div class="col-4"><input type="text" class="form-control form-control-sm subnet-cidr" placeholder="CIDR (10.0.1.0/24)"></div>
              <div class="col-3"><input type="text" class="form-control form-control-sm subnet-zone" placeholder="Zone"></div>
              <div class="col-1"><button type="button" class="btn btn-sm btn-ghost-danger" onclick="removeSubnetRow(this)">✕</button></div>
            </div>
          </div>
          <button type="button" class="btn btn-sm btn-outline-secondary mt-1" onclick="addSubnetRow()">+ Add Subnet</button>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="submitCreateVpc()">Create</button>
      </div>
    </div>
  </div>
</div>

{{ javascriptTag("common/api/services/vpc_api.js") | raw }}
{{ javascriptTag("pages/settings/environment/cloudresources/networks.js") | raw }}
