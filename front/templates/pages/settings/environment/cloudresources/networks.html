<div class="page-body">
  <div class="container-xl">
    <!-- VNet LIST SECTION -->
    <div id="index" class="section">
      <div class="row row-cards">
        <div class="col-12">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">네트워크 (VPC) 목록</h3>
            </div>
            <div class="card-body p-0">
              <div id="vnet-list-table"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Import VNet 모달 (RQ-CLOUD-ADMIN-007) -->
<div class="modal modal-blur fade" id="import-vnet-modal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">미관리 VNet 임포트</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="row mb-3 align-items-end">
          <div class="col-8">
            <label class="form-label">Connection</label>
            <select class="form-select" id="import-vnet-connection"></select>
          </div>
          <div class="col-4">
            <button class="btn btn-secondary w-100"
              onclick="webconsolejs['pages/settings/environment/cloudresources/networks'].loadUnmanagedVNets()">조회</button>
          </div>
        </div>
        <div class="mb-2">
          <label class="form-label">대상 프로젝트</label>
          <input type="text" class="form-control" id="import-vnet-project" readonly>
        </div>
        <!-- 목록 테이블 -->
        <div id="import-vnet-list-area" class="d-none">
          <div class="table-responsive">
            <table class="table table-vcenter">
              <thead>
                <tr>
                  <th style="width:40px"><input type="checkbox" id="import-vnet-select-all" class="form-check-input"></th>
                  <th>VNet명</th>
                  <th>CIDR</th>
                  <th>CSP ID</th>
                  <th>상태</th>
                </tr>
              </thead>
              <tbody id="import-vnet-tbody"></tbody>
            </table>
          </div>
        </div>
        <div id="import-vnet-loading" class="text-center py-3 d-none">
          <div class="spinner-border text-primary" role="status"></div>
        </div>
        <div id="import-vnet-empty" class="text-center text-muted py-3 d-none">미관리 VNet이 없습니다.</div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
        <button type="button" class="btn btn-primary" id="import-vnet-execute-btn"
          onclick="webconsolejs['pages/settings/environment/cloudresources/networks'].executeImportVNets()">
          <span id="import-vnet-spinner" class="spinner-border spinner-border-sm d-none me-1" role="status"></span>
          선택 항목 Import
        </button>
      </div>
    </div>
  </div>
</div>

{{ javascriptTag("common/api/services/import_api.js") | raw }}
{{ javascriptTag("pages/settings/environment/cloudresources/networks.js") | raw }}
