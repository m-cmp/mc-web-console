<div class="page-body">
  <div class="container-xl">
    <div id="index" class="section">
      <div class="row row-cards">
        <div class="col-12">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">DataDisk List</h3>
            </div>
            <div class="card-body p-0">
              <div id="datadisk-list-table"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Import DataDisk 모달 (RQ-CLOUD-ADMIN-007) -->
<div class="modal modal-blur fade" id="import-datadisk-modal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Import DataDisk</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="alert alert-info mb-3">
          All unregistered DataDisks for the selected Connection will be registered to the current project.
        </div>
        <div class="mb-3">
          <label class="form-label">Connection</label>
          <select class="form-select" id="import-datadisk-connection"></select>
        </div>
        <div class="mb-2">
          <label class="form-label">Target Project</label>
          <input type="text" class="form-control" id="import-datadisk-project" readonly>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary"
          onclick="webconsolejs['pages/settings/environment/cloudresources/datadisk'].executeImportDisk()">
          <span id="import-datadisk-spinner" class="spinner-border spinner-border-sm d-none me-1" role="status"></span>
          Run Import
        </button>
      </div>
    </div>
  </div>
</div>

{{ javascriptTag("common/api/services/import_api.js") | raw }}
{{ javascriptTag("pages/settings/environment/cloudresources/datadisk.js") | raw }}
