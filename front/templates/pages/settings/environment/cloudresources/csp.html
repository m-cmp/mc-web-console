<div class="page-body">
  <div class="container-xl">

    <!-- Filter Card -->
    <div class="row row-cards mb-3">
      <div class="col-12">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Unmanaged CSP Resources</h3>
            <div class="card-options ms-auto">
              <button class="btn btn-sm btn-outline-secondary" onclick="cspReloadAll()">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none">
                  <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                  <path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"/>
                  <path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"/>
                </svg>
                Refresh
              </button>
            </div>
          </div>
          <div class="card-body">
            <div class="row g-3 align-items-end">
              <div class="col-md-3">
                <label class="form-label">Connection (Filter)</label>
                <select id="filter-connection" class="form-select" onchange="cspApplyFilter()">
                  <option value="">All Connections</option>
                </select>
              </div>
              <div class="col-md-9">
                <label class="form-label">Resource Type (Filter)</label>
                <div class="d-flex gap-3 flex-wrap">
                  <label class="form-check"><input class="form-check-input filter-type-cb" type="checkbox" value="vNet" checked onchange="cspApplyFilter()"><span class="form-check-label">vNet</span></label>
                  <label class="form-check"><input class="form-check-input filter-type-cb" type="checkbox" value="securityGroup" checked onchange="cspApplyFilter()"><span class="form-check-label">Security Group</span></label>
                  <label class="form-check"><input class="form-check-input filter-type-cb" type="checkbox" value="sshKey" checked onchange="cspApplyFilter()"><span class="form-check-label">SSH Key</span></label>
                  <label class="form-check"><input class="form-check-input filter-type-cb" type="checkbox" value="vm" checked onchange="cspApplyFilter()"><span class="form-check-label">VM</span></label>
                </div>
              </div>
            </div>
          </div>
          <!-- Loading indicator -->
          <div id="csp-loading" class="card-footer text-center text-secondary small py-2" style="display:none">
            <div class="spinner-border spinner-border-sm me-1"></div> Loading resources from CSP…
          </div>
          <div class="card-body p-0">
            <div id="csp-unmanaged-table"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Registered Resources (Unregister) Card -->
    <div class="row row-cards mb-3">
      <div class="col-12">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Registered Resources (MCMP)</h3>
            <div class="card-options ms-auto">
              <button class="btn btn-sm btn-outline-danger" id="btn-unregister" onclick="cspUnregister()" disabled>
                Unregister
              </button>
            </div>
          </div>
          <div class="card-body p-0">
            <div id="csp-registered-table"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Target / Register Card -->
    <div class="row row-cards">
      <div class="col-12">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Register Target</h3>
          </div>
          <div class="card-body">
            <div class="row g-3 align-items-end">
              <div class="col-md-3">
                <label class="form-label required">Connection</label>
                <select id="target-connection" class="form-select">
                  <option value="">Select Connection</option>
                </select>
              </div>
              <div class="col-md-5">
                <label class="form-label required">Resource Type</label>
                <div class="d-flex gap-3 flex-wrap">
                  <label class="form-check"><input class="form-check-input target-type-cb" type="checkbox" value="vNet"><span class="form-check-label">vNet</span></label>
                  <label class="form-check"><input class="form-check-input target-type-cb" type="checkbox" value="securityGroup"><span class="form-check-label">Security Group</span></label>
                  <label class="form-check"><input class="form-check-input target-type-cb" type="checkbox" value="sshKey"><span class="form-check-label">SSH Key</span></label>
                  <label class="form-check"><input class="form-check-input target-type-cb" type="checkbox" value="vm" onchange="cspToggleMciName()"><span class="form-check-label">VM</span></label>
                </div>
              </div>
              <div class="col-md-4">
                <label class="form-label required">Namespace</label>
                <select id="target-ns" class="form-select">
                  <option value="">Select Namespace</option>
                </select>
              </div>
              <div class="col-md-4" id="mci-name-group" style="display:none">
                <label class="form-label required">MCI Name (for VM)</label>
                <input type="text" id="target-mci-name" class="form-control" placeholder="imported-mci">
              </div>
              <div class="col-md-4">
                <label class="form-check mt-4">
                  <input class="form-check-input" type="checkbox" id="schedule-toggle" onchange="cspToggleSchedule()">
                  <span class="form-check-label">Schedule Registration</span>
                </label>
              </div>
              <div class="col-md-4" id="schedule-interval-group" style="display:none">
                <label class="form-label">Interval (seconds)</label>
                <input type="number" id="schedule-interval" class="form-control" value="60" min="10">
              </div>
              <div class="col-12">
                <button class="btn btn-primary" onclick="cspSubmitRegist()">
                  <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M12 5l0 14"/>
                    <path d="M5 12l14 0"/>
                  </svg>
                  CSP Regist
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

{{ javascriptTag("common/api/services/cspimport_api.js") | raw }}
{{ javascriptTag("pages/settings/environment/cloudresources/csp.js") | raw }}
