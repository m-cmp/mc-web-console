<div class="page-body">
  <div class="container-xl">

    <div class="row row-cards">
      <div class="col-12">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Security Group List</h3>
            <div class="card-options ms-auto d-flex gap-2 align-items-center">
              <label class="form-label mb-0 me-1">Namespace</label>
              <select id="ns-selector" class="form-select form-select-sm" style="width:180px"></select>
            </div>
          </div>
          <div class="card-body p-0">
            <div id="sg-table"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="view-mode-cards" class="collapse">
      <div class="row row-cards mt-2">
        <div class="col-12">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Security Group Info — <span id="detail-name" class="text-primary"></span></h3>
              <div class="card-options">
                <button class="btn btn-sm btn-ghost-danger" onclick="deleteSg()">Delete</button>
                <a href="#" class="card-options-remove" onclick="hideDetail()">
                  <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24"
                    stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                    <path d="M18 6l-12 12"></path><path d="M6 6l12 12"></path>
                  </svg>
                </a>
              </div>
            </div>
            <div class="card-body">
              <div class="datagrid">
                <div class="datagrid-item">
                  <div class="datagrid-title">SG Name</div>
                  <div class="datagrid-content" id="detail-sgName">-</div>
                </div>
                <div class="datagrid-item">
                  <div class="datagrid-title">VPC</div>
                  <div class="datagrid-content" id="detail-vpcName">-</div>
                </div>
                <div class="datagrid-item">
                  <div class="datagrid-title">Namespace</div>
                  <div class="datagrid-content" id="detail-ns">-</div>
                </div>
                <div class="datagrid-item">
                  <div class="datagrid-title">Connection</div>
                  <div class="datagrid-content" id="detail-connection">-</div>
                </div>
              </div>
              <h4 class="mt-3">Firewall Rules</h4>
              <div id="rule-table"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Create Modal -->
<div class="modal modal-blur fade" id="create-sg-modal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Create Security Group</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label required">Namespace</label>
          <select id="modal-ns" class="form-select"></select>
        </div>
        <div class="mb-3">
          <label class="form-label required">SG Name</label>
          <input type="text" id="modal-sgName" class="form-control" placeholder="my-sg">
        </div>
        <div class="mb-3">
          <label class="form-label required">VPC Name</label>
          <input type="text" id="modal-vpcName" class="form-control" placeholder="my-vpc">
        </div>
        <div class="mb-2">
          <label class="form-label">Firewall Rules</label>
          <div id="rule-rows">
            <div class="rule-row row g-2 mb-2">
              <div class="col-2"><select class="form-select form-select-sm rule-protocol"><option>TCP</option><option>UDP</option><option>ICMP</option><option>ALL</option></select></div>
              <div class="col-2"><select class="form-select form-select-sm rule-direction"><option value="inbound">Inbound</option><option value="outbound">Outbound</option></select></div>
              <div class="col-3"><input type="text" class="form-control form-control-sm rule-cidr" placeholder="CIDR (0.0.0.0/0)"></div>
              <div class="col-2"><input type="number" class="form-control form-control-sm rule-from" placeholder="From Port"></div>
              <div class="col-2"><input type="number" class="form-control form-control-sm rule-to" placeholder="To Port"></div>
              <div class="col-1"><button type="button" class="btn btn-sm btn-ghost-danger" onclick="removeRuleRow(this)">✕</button></div>
            </div>
          </div>
          <button type="button" class="btn btn-sm btn-outline-secondary mt-1" onclick="addRuleRow()">+ Add Rule</button>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="submitCreateSg()">Create</button>
      </div>
    </div>
  </div>
</div>
