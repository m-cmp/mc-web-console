<div class="container-xl">
  <div class="row">
    <!-- CSP 계정 목록 -->
    <div id="csp-accounts-list-col" class="col-12">
      <div class="card">
        <div class="card-header d-flex align-items-center gap-2">
          <div class="me-auto">
            <!-- CSP 타입 필터 버튼 -->
            <div class="btn-group" id="csp-type-filter" role="group">
              <button type="button" class="btn btn-sm btn-outline-secondary active" data-csp-type="">전체</button>
              <button type="button" class="btn btn-sm btn-outline-secondary" data-csp-type="aws">AWS</button>
              <button type="button" class="btn btn-sm btn-outline-secondary" data-csp-type="gcp">GCP</button>
              <button type="button" class="btn btn-sm btn-outline-secondary" data-csp-type="azure">Azure</button>
            </div>
          </div>
        </div>
        <div class="card-body p-0">
          <div id="csp-accounts-table"></div>
        </div>
      </div>
    </div>

    <!-- CSP 계정 상세 패널 (slide-over) -->
    <div id="csp-account-detail-panel" class="col-12 col-md-6 d-none">
      <div class="card">
        <div class="card-header d-flex align-items-center">
          <button type="button" class="btn btn-sm btn-ghost-secondary me-2" id="detail-panel-close-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            목록으로
          </button>
          <h3 class="card-title mb-0" id="detail-panel-title"></h3>
          <div class="card-options ms-auto">
            <button type="button" class="btn btn-sm btn-outline-primary me-2" id="detail-edit-btn">Edit</button>
            <button type="button" class="btn btn-sm btn-primary me-2 d-none" id="detail-save-btn">Save</button>
            <button type="button" class="btn btn-sm btn-ghost-secondary me-2 d-none" id="detail-cancel-btn">Cancel</button>
            <button type="button" class="btn btn-sm btn-outline-danger" id="detail-delete-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4h6v2"></path></svg>
            </button>
          </div>
        </div>
        <div class="card-body" id="detail-panel-body">
          <!-- 상세 내용은 JS에서 동적 렌더링 -->
        </div>
        <div class="card-footer d-flex align-items-center gap-2">
          <div id="detail-status-control"></div>
          <div class="ms-auto">
            <button type="button" class="btn btn-sm btn-outline-secondary" id="detail-validate-btn">
              <span class="spinner-border spinner-border-sm d-none me-1" id="validate-spinner"></span>
              Validate
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CSP 계정 등록 모달 -->
<div class="modal modal-blur fade" id="csp-account-create-modal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">CSP 계정 등록</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label required">계정 이름</label>
          <input type="text" class="form-control" id="create-name" placeholder="예: my-aws-account">
        </div>
        <div class="mb-3">
          <label class="form-label required">CSP 타입</label>
          <select class="form-select" id="create-csp-type">
            <option value="">선택하세요</option>
            <option value="aws">AWS</option>
            <option value="gcp">GCP</option>
            <option value="azure">Azure</option>
          </select>
        </div>
        <div id="create-account-info-fields">
          <!-- CSP 타입 선택 후 동적 렌더링 -->
        </div>
        <div class="mb-3">
          <label class="form-label">설명</label>
          <textarea class="form-control" id="create-description" rows="2" placeholder="계정 설명 (선택)"></textarea>
        </div>
        <div id="create-error-msg" class="alert alert-danger d-none"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
        <button type="button" class="btn btn-primary" id="create-save-btn">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- CSP 계정 삭제 확인 모달 -->
<div class="modal modal-blur fade" id="csp-account-delete-modal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm" role="document">
    <div class="modal-content">
      <div class="modal-body">
        <div class="modal-title">정말 삭제하시겠습니까?</div>
        <div class="text-secondary mt-2">
          <strong id="delete-account-name"></strong> 계정을 삭제합니다. 이 작업은 되돌릴 수 없습니다.
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-link link-secondary me-auto" data-bs-dismiss="modal">취소</button>
        <button type="button" class="btn btn-danger" id="delete-confirm-btn">삭제</button>
      </div>
    </div>
  </div>
</div>

{{ javascriptTag("common/api/services/csp_accounts_api.js") | raw }}
{{ javascriptTag("pages/settings/environment/cloudsps/cloudoverview.js") | raw }}
