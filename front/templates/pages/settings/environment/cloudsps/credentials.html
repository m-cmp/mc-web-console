<div class="page-body">
  <div class="container-xl">

    <!-- Credential Holder 목록 -->
    <div class="row row-cards mb-3">
      <div class="col-12">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Registered Credentials</h3>
            <div class="card-actions">
              <a class="btn-action" onclick="webconsolejs['pages/settings/environment/cloudsps/credentials'].refreshHolderList()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  class="icon icon-tabler icons-tabler-outline icon-tabler-refresh">
                  <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                  <path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"></path>
                  <path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"></path>
                </svg>
              </a>
            </div>
          </div>
          <div class="card-table table-responsive">
            <div id="credential-holder-table"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Credential 등록 폼 (collapse) -->
    <div id="credential-create-section" class="collapse">
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Register Credential</h3>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-6">

              <div class="mb-3">
                <label class="form-label required">Provider</label>
                <select class="form-select" id="cred-provider">
                  <option value="">Select Provider</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label required">Credential Holder</label>
                <input type="text" class="form-control" id="cred-holder" value="admin"
                  placeholder="소문자, 숫자, 언더스코어만 사용 (e.g. admin, team_a)">
                <small class="form-hint">영문 소문자·숫자·언더스코어만 허용. 하이픈 불가.</small>
              </div>

              <!-- Provider별 Credential Key 입력 필드 (동적 렌더링) -->
              <div id="cred-key-fields"></div>

            </div>
          </div>
        </div>
        <div class="card-footer text-end">
          <a href="#credential-create-section" class="btn btn-outline-secondary me-2"
            data-bs-toggle="collapse" data-bs-target="#credential-create-section">Cancel</a>
          <button class="btn btn-primary"
            onclick="webconsolejs['pages/settings/environment/cloudsps/credentials'].submitCredential()">
            Register
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

{{ javascriptTag("common/api/services/cloudconnection_api.js") | raw }}
{{ javascriptTag("pages/settings/environment/cloudsps/credentials.js") | raw }}
